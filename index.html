<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Sessions_Log - Supabase</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 30px;
    }
    table {
      border-collapse: collapse;
      width: 80%;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #ffffff55;
      padding: 8px 12px;
      text-align: left;
    }
    th {
      background-color: #2563eb;
    }
    tr:nth-child(even) {
      background-color: #1e293b;
    }
    .error {
      color: #f87171;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <div>
    <h1>Sessions_Log</h1>
    <div id="error" class="error"></div>
    <table id="table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Player_id</th>
          <th>Game_id</th>
          <th>HasWon</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr><td colspan="4">Chargement...</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    const SUPABASE_URL = 'https://pqdeamtxitjntvaqjtyu.supabase.co/rest/v1/Sessions_Log';
    const API_KEY = 'sb_publishable_gJkMopfPTbdTYYZuleayiA_X5oi5W0u';

    async function loadData() {
      const tableBody = document.getElementById("table-body");
      const errorDiv = document.getElementById("error");

      try {
        const res = await fetch(SUPABASE_URL, {
          headers: {
            "apikey": API_KEY,
            "Authorization": "Bearer " + API_KEY,
            "Content-Type": "application/json"
          }
        });

        if (!res.ok) {
          const text = await res.text();
          throw new Error(`HTTP ${res.status} : ${text}`);
        }

        const data = await res.json();

        if (!data || data.length === 0) {
          tableBody.innerHTML = "<tr><td colspan='4'>Aucune donnée dans la table</td></tr>";
          return;
        }

        // Générer le tableau
        tableBody.innerHTML = "";
        data.forEach(row => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${row.id}</td>
            <td>${row.Player_id}</td>
            <td>${row.Game_id}</td>
            <td>${row.HasWon}</td>
          `;
          tableBody.appendChild(tr);
        });

      } catch (e) {
        console.error(e);
        errorDiv.textContent = "Erreur réseau / CORS : " + e.message;
        tableBody.innerHTML = "<tr><td colspan='4'>Impossible de charger les données</td></tr>";
      }
    }

    window.addEventListener("DOMContentLoaded", loadData);
  </script>

</body>
</html>
